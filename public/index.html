<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Sora", sans-serif;
}

body {
  background: #0b0f19;
  color: #e5e7eb;
}

.container {
  display: flex;
  min-height: 100vh;
}

.left {
  width: 30%;
  background: #0f172a;
  padding: 30px;
  display: flex;
  flex-direction: column;
}

.left h1 {
  font-size: 26px;
  margin-bottom: 25px;
  background: linear-gradient(90deg, #6366f1, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

input, button {
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
}

input {
  border: 1px solid #374151;
  background: #020617;
  color: white;
}

button {
  border: none;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.right {
  width: 70%;
  padding: 30px;
  overflow-y: auto;
}

#preview {
  width: 100%;
  height: 300px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: none;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.score-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 24px;
  font-weight: bold;
}

.match {
  font-size: 20px;
  color: #22c55e;
  font-weight: bold;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left, .right {
    width: 100%;
  }

  #preview {
    height: 200px;
  }

  .score-circle {
    width: 80px;
    height: 80px;
    font-size: 18px;
  }

  button, input {
    width: 100%;
  }

  /* ERROR BOX */
.error-box {
  background: #533197;
  border: 1px solid #051017;
  color: #e08550;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: 500;
}

.back-btn {
  display: block;
  margin: 20px auto 0;
  padding: 10px 20px;
  background: linear-gradient(135deg, #05050f, #22c55e);
}
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <h1>Resume Analyzer</h1>

  <input list="roles" id="role" placeholder="Job Role" />

  <datalist id="roles">
    <option value="Software Developer">
    <option value="Frontend Developer">
    <option value="Backend Developer">
    <option value="Full Stack Developer">
    <option value="Data Analyst">
    <option value="AI Engineer">
  </datalist>

  <input type="file" id="fileInput" />

  <button onclick="uploadResume()">Analyze Resume</button>
</div>

<div class="right" id="result">
  <iframe id="preview"></iframe>
  <p>Upload resume to see results</p>
</div>

</div>

<script>
async function uploadResume() {
  const file = document.getElementById("fileInput").files[0];
  const role = document.getElementById("role").value;

  if (!file) return alert("Select file");
  if (!role.trim()) {
  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="error-box">
        ⚠️ Please enter a job role before analyzing.
      </div>
      <button class="back-btn" onclick="goBack()">⬅ Back</button>
    </div>
  `;
  return;
}

  const previewURL = URL.createObjectURL(file);

  document.getElementById("result").innerHTML =
    `<iframe id="preview" src="${previewURL}"></iframe>
     <p>Analyzing...</p>`;

  const formData = new FormData();
  formData.append("resume", file);
  formData.append("role", role);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    let data;

    try {
      data = await res.json();
    } catch {
      throw new Error("Invalid JSON");
    }
// 🔥 Resume check error
if (data.error) {
  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="error-box">
        ❌ ${data.error}
      </div>
      <button class="back-btn" onclick="goBack()">⬅ Back</button>
    </div>
  `;
  return;
}
    // 🔥 SUCCESS RESULT
    document.getElementById("result").innerHTML = `
  <button class="back-btn" onclick="goBack()">⬅ Back</button>

  <iframe id="preview" src="${previewURL}"></iframe>

  <div class="card">
    <div class="score-circle">${data.score || 0}</div>
  </div>

  <div class="card">
    <b>Match:</b> <span class="match">${data.match_score || 0}%</span>
  </div>

  <div class="card">
    <b>ATS:</b> <span class="match">${data.ats_score || 0}%</span>
  </div>

  <div class="card">
    <b>Summary:</b>
    <p>${data.summary || "No summary available"}</p>
  </div>

  <div class="card">
    <b>Suggestions:</b>
    <ul>${(data.suggestions || []).map(s => `<li>${s}</li>`).join("")}</ul>
  </div>

  <div class="card">
    <b>Recommended Keywords:</b>
    <ul>${(data.recommended_keywords || []).map(k => `<li>${k}</li>`).join("")}</ul>
  </div>

  <div class="card">
    <b>Improvement Tips:</b>
    <ul>${(data.improvement_tips || []).map(t => `<li>${t}</li>`).join("")}</ul>
  </div>

  <div class="card">
    <b>Role Specific Advice:</b>
    <ul>${(data.role_specific_advice || []).map(a => `<li>${a}</li>`).join("")}</ul>
  </div>

  <button onclick='downloadPDF(${JSON.stringify(data)})'>
    Download PDF
  </button>
`;

  } catch (err) {
    document.getElementById("result").innerHTML = `
      <div class="card">
        <div class="error-box">
  ⚠️ Something went wrong. Please try again.
</div>
<button class="back-btn" onclick="goBack()">⬅ Back</button>
      
      </div>
    `;
    console.error(err);
  }
}


// 🔥 BACK BUTTON
function goBack() {
  document.getElementById("result").innerHTML = `
    <iframe id="preview"></iframe>
    <p>Upload resume to see results</p>
  `;
}

// 🔥 DOWNLOAD PDF
async function downloadPDF(data) {
  try {
    const res = await fetch("/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error("Server error");

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "resume-analysis.pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();

  } catch (err) {
    alert("PDF download failed ❌");
    console.error(err);
  }
}
</script>
