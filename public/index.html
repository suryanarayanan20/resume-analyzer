<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Resume Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Sora", sans-serif;
}

body {
  height: 100vh;
  background: #0b0f19;
  color: #e5e7eb;
  overflow: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: absolute;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle at center, rgba(99,102,241,0.35), transparent 70%);
  top: -250px;
  left: -250px;
  filter: blur(100px);
}

body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle at center, rgba(34,197,94,0.35), transparent 70%);
  bottom: -200px;
  right: -200px;
  filter: blur(80px);
}

.container {
  display: flex;
  height: 100vh;
  position: relative;
  z-index: 1;
}

/* LEFT */
.left {
  width: 28%;
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(20px);
  padding: 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-right: 1px solid #1f2937;
}

.left h1 {
  font-size: 30px;
  font-weight: 700;
  background: linear-gradient(90deg, #6366f1, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 30px;
}

input {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #020617;
  color: white;
  margin-bottom: 15px;
}

button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  color: white;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

/* RIGHT */
.right {
  width: 72%;
  padding: 50px;
  overflow-y: auto;
}

/* PREVIEW */
#preview {
  width: 100%;
  height: 300px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: none;
}

.title {
  font-size: 26px;
  margin-bottom: 25px;
  font-weight: 700;
}

.card {
  background: rgba(17,24,39,0.7);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 15px;
  border: 1px solid #1f2937;
}

.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 30px;
  font-weight: 700;
}

.match {
  font-size: 22px;
  font-weight: 700;
  color: #22c55e;
}

ul {
  margin-top: 8px;
  padding-left: 18px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h1>Resume Analyzer</h1>

  <!-- ROLE -->
  <input list="roles" id="role" placeholder="Type job role" />

  <datalist id="roles">
    <option value="Software Developer">
    <option value="Frontend Developer">
    <option value="Backend Developer">
    <option value="Full Stack Developer">
    <option value="Data Analyst">
    <option value="Data Scientist">
    <option value="AI Engineer">
    <option value="UI/UX Designer">
    <option value="DevOps Engineer">
  </datalist>

  <!-- FILE -->
  <input type="file" id="fileInput" />

  <button onclick="uploadResume()">Analyze Resume</button>
</div>

<!-- RIGHT -->
<div class="right" id="result">
  <iframe id="preview"></iframe>
  <div class="title">Analysis</div>
  <p>Upload your resume to see AI insights</p>
</div>

</div>

<script>
async function uploadResume() {
  const file = document.getElementById("fileInput").files[0];
  const role = document.getElementById("role").value;

  if (!file) return alert("Select file");

  document.getElementById("preview").src = URL.createObjectURL(file);

  const formData = new FormData();
  formData.append("resume", file);
  formData.append("role", role);

  document.getElementById("result").innerHTML =
    `<iframe id="preview" src="${URL.createObjectURL(file)}"></iframe>
     <div>Analyzing...</div>`;

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
      <iframe id="preview" src="${URL.createObjectURL(file)}"></iframe>

      <div class="card">
        <div class="score-circle">${data.score}</div>
      </div>

      <div class="card">
        <h3>Job Match (${role})</h3>
        <div class="match">${data.match_score || 0}%</div>
      </div>

      <div class="card">
        <h3>ATS Score</h3>
        <div class="match">${data.ats_score || 0}%</div>
      </div>

      <div class="card">
        <h3>Missing Skills</h3>
        <ul>${(data.missing_skills || []).map(s => `<li>${s}</li>`).join("")}</ul>
      </div>

      <div class="card">
        <h3>Summary</h3>
        <p>${data.summary}</p>
      </div>

      <div class="card">
        <h3>Strengths</h3>
        <ul>${data.strengths.map(s => `<li>${s}</li>`).join("")}</ul>
      </div>

      <div class="card">
        <h3>Weaknesses</h3>
        <ul>${data.weaknesses.map(w => `<li>${w}</li>`).join("")}</ul>
      </div>

      <div class="card">
        <h3>Suggestions</h3>
        <ul>${data.suggestions.map(s => `<li>${s}</li>`).join("")}</ul>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <button onclick='downloadPDF(${JSON.stringify(data)})'>
          📥 Download Report
        </button>
      </div>
    `;
  } catch {
    document.getElementById("result").innerHTML = "Error";
  }
}

async function downloadPDF(data) {
  const res = await fetch("/download", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "resume-analysis.pdf";
  a.click();
}
</script>

</body>
</html>
