<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Sora", sans-serif;
}

body {
  background: #0b0f19;
  color: #e5e7eb;
}

/* CONTAINER */
.container {
  display: flex;
  min-height: 100vh;
}

/* LEFT PANEL */
.left {
  width: 30%;
  background: #0f172a;
  padding: 30px;
  display: flex;
  flex-direction: column;
}

.left h1 {
  font-size: 26px;
  margin-bottom: 25px;
  background: linear-gradient(90deg, #6366f1, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

input, button {
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
}

input {
  border: 1px solid #374151;
  background: #020617;
  color: white;
}

button {
  border: none;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

/* RIGHT PANEL */
.right {
  width: 70%;
  padding: 30px;
  overflow-y: auto;
}

#preview {
  width: 100%;
  height: 300px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: none;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.score-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #22c55e);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 24px;
  font-weight: bold;
}

.match {
  font-size: 20px;
  color: #22c55e;
  font-weight: bold;
}

/* 🔥 MOBILE */
@media (max-width: 768px) {

  .container {
    flex-direction: column;
  }

  .left {
    width: 100%;
  }

  .right {
    width: 100%;
  }

  #preview {
    height: 200px;
  }

  .score-circle {
    width: 80px;
    height: 80px;
    font-size: 18px;
  }

  button, input {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <h1>Resume Analyzer</h1>

  <input list="roles" id="role" placeholder="Job Role" />

  <datalist id="roles">
    <option value="Software Developer">
    <option value="Frontend Developer">
    <option value="Backend Developer">
    <option value="Full Stack Developer">
    <option value="Data Analyst">
    <option value="AI Engineer">
  </datalist>

  <input type="file" id="fileInput" />

  <button onclick="uploadResume()">Analyze Resume</button>
</div>

<div class="right" id="result">
  <iframe id="preview"></iframe>
  <p>Upload resume to see results</p>
</div>

</div>

<script>
async function uploadResume() {
  const file = document.getElementById("fileInput").files[0];
  const role = document.getElementById("role").value;

  if (!file) return alert("Select file");

  const previewURL = URL.createObjectURL(file);

  document.getElementById("result").innerHTML =
    `<iframe id="preview" src="${previewURL}"></iframe>
     <p>Analyzing...</p>`;

  const formData = new FormData();
  formData.append("resume", file);
  formData.append("role", role);

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
      <iframe id="preview" src="${previewURL}"></iframe>

      <div class="card"><div class="score-circle">${data.score}</div></div>

      <div class="card"><b>Match:</b> <span class="match">${data.match_score}%</span></div>

      <div class="card"><b>ATS:</b> <span class="match">${data.ats_score}%</span></div>

      <div class="card"><b>Summary:</b><p>${data.summary}</p></div>

      <div class="card"><b>Suggestions:</b>
      <ul>${data.suggestions.map(s => `<li>${s}</li>`).join("")}</ul></div>

      <button onclick='downloadPDF(${JSON.stringify(data)})'>Download PDF</button>
    `;
  } catch {
    document.getElementById("result").innerHTML = "Error";
  }
}
</script>

</body>
</html>
